<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vCard</title>
  <style>
    :root {
      --blue: #6b8fe9;
      --page: #efefef;
      --card: #f6f6f7;
      --muted: #8f929b;
      --line: #d9dbe2;
      --text: #111111;
      --white: #ffffff;
      --shadow: 0 8px 22px rgba(16, 24, 40, 0.06);
      --radius-card: 20px;
      --radius-icon: 12px;
      --radius-pill: 999px;
      --hero-edge-gap: 42px;
      --hero-name-gap-top: 30px;
      --hero-button-gap-top: 28px;
      --content-gap-top: 42px;
      --page-side: 26px;
      --frame-max: 860px;
      --avatar-size: 320px;
      --avatar-border: 10px;
      --name-size: 70px;
      --name-line: 1.03;
      --button-width: 630px;
      --button-height: 118px;
      --button-font: 31px;
      --button-icon: 52px;
      --panel-header-h: 142px;
      --panel-title: 54px;
      --panel-icon: 96px;
      --label-size: 25px;
      --value-size: 32px;
      --row-gap: 20px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--page);
      overflow-y: auto;
      overflow-x: hidden;
    }

    body.empty {
      background: #ffffff;
    }

    .page {
      min-height: 100vh;
      background: var(--page);
    }

    .hero {
      background: var(--blue);
      padding: var(--hero-edge-gap) var(--page-side) var(--hero-edge-gap);
    }

    .hero-inner,
    .content-inner {
      width: min(calc(100vw - (var(--page-side) * 2)), var(--frame-max));
      margin: 0 auto;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar-wrap {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      border: var(--avatar-border) solid rgba(255,255,255,0.98);
      overflow: hidden;
      background: #dbe3f5;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      flex: 0 0 auto;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      margin: var(--hero-name-gap-top) 0 0;
      color: var(--white);
      font-size: var(--name-size);
      line-height: var(--name-line);
      font-weight: 700;
      letter-spacing: -0.045em;
    }

    .add-btn {
      margin-top: var(--hero-button-gap-top);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: min(100%, var(--button-width));
      min-height: var(--button-height);
      padding: 20px 34px;
      border: 0;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.94);
      color: var(--text);
      text-decoration: none;
      font-size: var(--button-font);
      line-height: 1;
      font-weight: 400;
      box-shadow: 0 8px 20px rgba(20, 20, 20, 0.04);
      cursor: pointer;
    }

    .plus-icon {
      width: var(--button-icon);
      height: var(--button-icon);
      flex: 0 0 var(--button-icon);
    }

    .content {
      padding: var(--content-gap-top) var(--page-side) 48px;
    }

    .accordion {
      display: grid;
      gap: 28px;
    }

    .panel {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-toggle {
      width: 100%;
      min-height: var(--panel-header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 24px;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      color: inherit;
      list-style: none;
    }

    summary::-webkit-details-marker { display: none; }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 22px;
      min-width: 0;
    }

    .section-title {
      margin: 0;
      font-size: var(--panel-title);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .icon-box {
      width: var(--panel-icon);
      height: var(--panel-icon);
      flex: 0 0 var(--panel-icon);
      border-radius: var(--radius-icon);
      background: #ededee;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .icon-box svg,
    .chevron {
      width: 44px;
      height: 44px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chevron-wrap {
      color: var(--muted);
      transition: transform 0.22s ease;
      flex: 0 0 auto;
    }

    .panel[open] .chevron-wrap {
      transform: rotate(90deg);
    }

    .panel-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
    }

    .panel[open] .panel-body {
      grid-template-rows: 1fr;
    }

    .panel-body-inner { overflow: hidden; }

    .divider {
      margin: 0 24px;
      height: 1px;
      background: var(--line);
    }

    .list { padding: 8px 0; }

    .row {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      gap: var(--row-gap);
      padding: 28px 34px;
      align-items: start;
      position: relative;
    }

    .row + .row::before {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      top: 0;
      height: 1px;
      background: var(--line);
    }

    .row .icon-box {
      width: 82px;
      height: 82px;
      margin-top: 2px;
    }

    .row .icon-box svg {
      width: 34px;
      height: 34px;
    }

    .value-wrap {
      min-width: 0;
      padding-top: 2px;
    }

    .label {
      font-size: var(--label-size);
      line-height: 1.15;
      color: var(--muted);
      margin: 0 0 10px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .value,
    .value a {
      font-size: var(--value-size);
      line-height: 1.22;
      color: var(--text);
      margin: 0;
      font-weight: 400;
      text-decoration: none;
      word-break: break-word;
    }

    .value a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      :root {
        --avatar-size: 260px;
        --avatar-border: 8px;
        --name-size: 46px;
        --button-width: 100%;
        --button-height: 86px;
        --button-font: 23px;
        --button-icon: 36px;
        --panel-header-h: 96px;
        --panel-title: 34px;
        --panel-icon: 68px;
        --label-size: 18px;
        --value-size: 22px;
      }

      .row {
        grid-template-columns: 90px minmax(0, 1fr);
        padding: 22px 22px;
      }

      .row + .row::before {
        left: 22px;
        right: 22px;
      }

      .row .icon-box {
        width: 64px;
        height: 64px;
      }

      .row .icon-box svg {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>
<body class="empty">
  <div id="app"></div>

  <script>
    const ICONS = {
      contact: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12c2.76 0 5-2.46 5-5.5S14.76 1 12 1 7 3.46 7 6.5 9.24 12 12 12Z"></path>
          <path d="M3 22c0-4.42 4.03-8 9-8s9 3.58 9 8"></path>
        </svg>`,
      company: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 22V8l9-4 9 4v14"></path>
          <path d="M9 22v-5h6v5"></path>
          <path d="M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01"></path>
        </svg>`,
      chevron: `
        <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 6l6 6-6 6"></path>
        </svg>`,
      plus: `
        <svg class="plus-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>`,
      phone: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.84 19.84 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5.15 12.8 19.84 19.84 0 0 1 2.08 4.09 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.89.33 1.76.62 2.61a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.47-1.23a2 2 0 0 1 2.11-.45c.85.29 1.72.5 2.61.62A2 2 0 0 1 22 16.92z"></path>
        </svg>`,
      email: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h16v16H4z"></path>
          <path d="M22 6l-10 7L2 6"></path>
        </svg>`,
      website: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"></path>
        </svg>`,
      telegram: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21.5 4.5L18 20.5c-.26 1.15-.94 1.43-1.9.89l-5.25-3.87-2.53 2.44c-.28.28-.52.52-1.06.52l.38-5.39 9.8-8.86c.43-.38-.09-.59-.66-.21L4.67 13.9.29 12.53c-.95-.3-.97-.95.2-1.41L19.14 3.8c.86-.32 1.61.2 1.36 1.7z"></path>
        </svg>`
    };

    const params = new URLSearchParams(window.location.search);
    const rawName = params.get('name') || '';
    const safeName = /^[A-Za-z0-9_-]+$/.test(rawName) ? rawName : '';

    function unfoldVcf(text) {
      return text.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
    }

    function parseLine(line) {
      const idx = line.indexOf(':');
      if (idx === -1) return null;

      const left = line.slice(0, idx);
      const value = line.slice(idx + 1);

      const parts = left.split(';');
      const name = parts[0].toUpperCase();
      const params = {};

      for (let i = 1; i < parts.length; i++) {
        const part = parts[i];
        const eqIndex = part.indexOf('=');
        if (eqIndex === -1) {
          params.TYPE = params.TYPE ? [].concat(params.TYPE, part) : part;
        } else {
          const key = part.slice(0, eqIndex).toUpperCase();
          const val = part.slice(eqIndex + 1);
          params[key] = params[key] ? [].concat(params[key], val) : val;
        }
      }

      return { name, params, value };
    }

    function decodeEscapes(str) {
      return str
        .replace(/\\n/gi, '\n')
        .replace(/\\,/g, ',')
        .replace(/\\;/g, ';')
        .replace(/\\\\/g, '\\');
    }

    function normalizeUrl(url) {
      if (!url) return '';
      const cleaned = url.trim();
      if (!cleaned) return '';
      if (/^https?:\/\//i.test(cleaned)) return cleaned;
      return 'https://' + cleaned;
    }

    function normalizeTelegram(input) {
      if (!input) return { label: '', href: '' };
      let value = input.trim();
      if (!value) return { label: '', href: '' };

      value = value.replace(/^https?:\/\/t\.me\//i, '@');
      value = value.replace(/^telegram:\/\//i, '');
      const username = value.startsWith('@') ? value.slice(1) : value;
      return {
        label: '@' + username,
        href: 'https://t.me/' + username
      };
    }

    function parseVcf(vcfText) {
      const text = unfoldVcf(vcfText);
      const lines = text.split(/\r\n|\n|\r/).filter(Boolean);

      const card = {
        fullName: '',
        phone: '',
        email: '',
        website: '',
        company: '',
        title: '',
        telegram: '',
        photoDataUrl: ''
      };

      const labelMap = {};

      for (const line of lines) {
        const parsed = parseLine(line);
        if (!parsed) continue;

        const { name, params, value } = parsed;
        const cleanValue = decodeEscapes(value).trim();

        if (/^ITEM\d+\.X-ABLABEL$/i.test(name)) {
          labelMap[name.split('.')[0].toUpperCase()] = cleanValue;
          continue;
        }

        if (name === 'FN' && cleanValue) {
          card.fullName = cleanValue;
          continue;
        }

        if (/^ITEM\d+\.EMAIL$/i.test(name) || name === 'EMAIL') {
          if (!card.email && cleanValue) card.email = cleanValue;
          continue;
        }

        if (/^ITEM\d+\.TEL$/i.test(name) || name === 'TEL') {
          if (!card.phone && cleanValue) card.phone = cleanValue;
          continue;
        }

        if (/^ITEM\d+\.URL$/i.test(name) || name === 'URL') {
          if (!card.website && cleanValue) card.website = cleanValue;
          continue;
        }

        if (name === 'ORG' && cleanValue) {
          card.company = cleanValue.replace(/;+/g, ' ').trim();
          continue;
        }

        if (name === 'TITLE' && cleanValue) {
          card.title = cleanValue;
          continue;
        }

        if (name === 'X-SOCIALPROFILE') {
          const typeValue = Array.isArray(params.TYPE) ? params.TYPE.join(',') : (params.TYPE || '');
          const upper = String(typeValue).toUpperCase();
          const isTelegram = upper.includes('TELEGRAM') || /(^|;)X-USER=/i.test(';' + Object.keys(params).map(k => `${k}=${params[k]}`).join(';')) || /telegram/i.test(cleanValue);

          if (isTelegram && !card.telegram) {
            const xUser = params['X-USER'];
            if (xUser) {
              card.telegram = Array.isArray(xUser) ? xUser[0] : xUser;
            } else if (cleanValue) {
              card.telegram = cleanValue;
            }
          }
          continue;
        }

        if (name === 'PHOTO') {
          const type = Array.isArray(params.TYPE) ? params.TYPE[0] : (params.TYPE || 'JPEG');
          const encoding = Array.isArray(params.ENCODING) ? params.ENCODING[0] : params.ENCODING;
          if (/^b$/i.test(encoding || '') || /^base64$/i.test(encoding || '')) {
            const base64 = cleanValue.replace(/\s+/g, '');
            if (base64) {
              card.photoDataUrl = `data:image/${String(type).toLowerCase()};base64,${base64}`;
            }
          } else if (/^https?:\/\//i.test(cleanValue)) {
            card.photoDataUrl = cleanValue;
          }
        }
      }

      return card;
    }

    function makeRow(icon, label, valueHtml) {
      return `
        <div class="row">
          <div class="icon-box">${icon}</div>
          <div class="value-wrap">
            <p class="label">${label}</p>
            <p class="value">${valueHtml}</p>
          </div>
        </div>
      `;
    }

    function makePanel(title, sectionIcon, rowsHtml, open = true) {
      return `
        <details class="panel" ${open ? 'open' : ''}>
          <summary class="panel-toggle">
            <div class="panel-header-left">
              <div class="icon-box">${sectionIcon}</div>
              <h2 class="section-title">${title}</h2>
            </div>
            <div class="chevron-wrap">${ICONS.chevron}</div>
          </summary>
          <div class="divider"></div>
          <div class="panel-body">
            <div class="panel-body-inner">
              <div class="list">${rowsHtml}</div>
            </div>
          </div>
        </details>
      `;
    }

    async function loadProfile() {
      if (!safeName) return;

      try {
        const response = await fetch(`./${safeName}.vcf`, { cache: 'no-store' });
        if (!response.ok) return;

        const vcfText = await response.text();
        if (!/BEGIN:VCARD/i.test(vcfText)) return;

        const card = parseVcf(vcfText);

        if (!card.fullName) return;

        const contactRows = [];
        if (card.phone) {
          const tel = card.phone.replace(/[^\d+]/g, '');
          contactRows.push(makeRow(ICONS.phone, 'Phone', `<a href="tel:${tel}">${card.phone}</a>`));
        }
        if (card.email) {
          contactRows.push(makeRow(ICONS.email, 'Email', `<a href="mailto:${card.email}">${card.email}</a>`));
        }
        if (card.website) {
          const siteHref = normalizeUrl(card.website);
          contactRows.push(makeRow(ICONS.website, 'Website', `<a href="${siteHref}" target="_blank" rel="noopener noreferrer">${card.website}</a>`));
        }
        if (card.telegram) {
          const tg = normalizeTelegram(card.telegram);
          if (tg.label && tg.href) {
            contactRows.push(makeRow(ICONS.telegram, 'Telegram', `<a href="${tg.href}" target="_blank" rel="noopener noreferrer">${tg.label}</a>`));
          }
        }

        const companyRows = [];
        if (card.company) {
          companyRows.push(makeRow(ICONS.company, 'Company', card.company));
        }
        if (card.title) {
          companyRows.push(makeRow(ICONS.company, 'Title', card.title));
        }

        if (contactRows.length === 0 && companyRows.length === 0) {
          return;
        }

        const photoSrc = card.photoDataUrl || `./${safeName}.jpg`;

        document.title = card.fullName;
        document.body.classList.remove('empty');

        document.getElementById('app').innerHTML = `
          <div class="page">
            <section class="hero">
              <div class="hero-inner">
                <div class="avatar-wrap">
                  <img class="avatar" src="${photoSrc}" alt="${card.fullName}" onerror="this.onerror=null; this.src=''; this.parentElement.style.display='none';">
                </div>
                <h1 class="name">${card.fullName}</h1>
                <a class="add-btn" href="./${safeName}.vcf" download>
                  ${ICONS.plus}
                  <span>Add Contact</span>
                </a>
              </div>
            </section>

            <section class="content">
              <div class="content-inner">
                <div class="accordion">
                  ${contactRows.length ? makePanel('Contact', ICONS.contact, contactRows.join(''), true) : ''}
                  ${companyRows.length ? makePanel('Company', ICONS.company, companyRows.join(''), true) : ''}
                </div>
              </div>
            </section>
          </div>
        `;
      } catch (e) {
        // Intentionally keep the page empty.
      }
    }

    loadProfile();
  </script>
</body>
</html>
